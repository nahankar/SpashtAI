# livekit.spasht.ai — DNS only in Cloudflare (grey cloud), not HTTP-proxied
# WebRTC UDP goes directly to EC2; Nginx terminates WSS on 443 → LiveKit :7880
server {
    listen 80;
    listen [::]:80;
    server_name livekit.spasht.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name livekit.spasht.ai;

    # DNS-only (grey cloud): browsers hit EC2 directly — must use a public CA cert.
    # Cloudflare origin certs are NOT trusted by browsers. Run once: ./infra/ec2/setup-livekit-tls.sh
    ssl_certificate     /etc/letsencrypt/live/livekit.spasht.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.spasht.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
