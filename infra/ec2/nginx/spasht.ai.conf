# spasht.ai — static SPA (Cloudflare proxied, origin TLS via Cloudflare cert)
server {
    listen 80;
    listen [::]:80;
    server_name spasht.ai www.spasht.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spasht.ai www.spasht.ai;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    ssl_certificate     /etc/ssl/cloudflare/spasht.ai.pem;
    ssl_certificate_key /etc/ssl/cloudflare/spasht.ai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/spashtai;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        # GIS popup needs this on HTML responses (location / serves index.html for SPA routes)
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
