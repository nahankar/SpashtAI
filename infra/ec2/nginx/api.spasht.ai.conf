# api.spasht.ai — Node API (Cloudflare proxied)
server {
    listen 80;
    listen [::]:80;
    server_name api.spasht.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.spasht.ai;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    ssl_certificate     /etc/ssl/cloudflare/spasht.ai.pem;
    ssl_certificate_key /etc/ssl/cloudflare/spasht.ai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
