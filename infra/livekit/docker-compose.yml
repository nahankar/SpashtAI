version: '3.8'
services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881" 
      - "7882:7882/udp"
    # Mount config file to enable agents
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml", "--bind", "0.0.0.0"]
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_KEYS}
    # host networking simplifies UDP and TLS handling

  redis:
    image: redis:alpine
    container_name: livekit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  egress:
    image: livekit/egress:latest
    container_name: livekit-egress
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml
      - ../../apps/agent/audio_storage:/out  # Mount local storage for recordings
    depends_on:
      - livekit
      - redis


